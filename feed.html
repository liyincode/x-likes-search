<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Likes Search</title>
    <link rel="stylesheet" href="feed.css" />
  </head>
  <body>
    <div class="shell">
      <div class="bar">
        <div class="logo"><b>X Likes</b><span class="t">Search</span></div>
        <div class="grow"></div>
        <button class="ico-btn square" id="theme-btn" title="Toggle theme" aria-label="Toggle theme"></button>
        <button class="ico-btn" id="export">export</button>
        <button class="ico-btn accent" id="open-likes">sync</button>
      </div>

      <div class="search-bar">
        <div class="cmd-wrap">
          <div class="cmd">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
              <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <input id="q" type="text" placeholder="Find a liked tweet…" autocomplete="off" spellcheck="false" />
            <span class="matchcount" id="mc"></span>
          </div>
          <div class="history" id="history"></div>
        </div>
      </div>

      <div class="filters">
        <div class="sortgrp" id="sort" aria-label="Sort results">
          <button data-sort="newest" aria-pressed="true">newest</button>
          <button data-sort="oldest" aria-pressed="false">oldest</button>
          <button data-sort="author" aria-pressed="false">author</button>
        </div>
      </div>

      <div class="feed-scroll" id="feed-scroll">
        <div class="results" id="results"></div>
        <div id="empty"></div>
      </div>
    </div>

    <div class="statusbar">
      <div class="sb-inner">
        <span class="sb-status"><span class="sb-dot"></span><span id="sb-status">0 liked · local only</span></span>
        <span class="sb-grow"></span>
        <span class="sb-hints">
          <span><span class="key">↵</span><span class="key">↓</span> next</span>
          <span><span class="key">↑</span> prev</span>
          <span><span class="key">⌘</span><span class="key">↵</span> open</span>
          <span><span class="key">esc</span> clear</span>
        </span>
      </div>
    </div>

    <div class="toast" id="toast"><span class="ic">✓</span><span id="toast-txt">Link copied</span></div>

    <script src="feed-core.js"></script>
    <script src="feed.js"></script>
  </body>
</html>
