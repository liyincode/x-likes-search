<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Likes Search</title>
    <link rel="stylesheet" href="feed.css" />
  </head>
  <body>
    <div class="shell">
      <div class="bar">
        <div class="logo"><b>X Likes</b><span class="t">Search</span></div>
        <div class="grow"></div>
        <a class="ico-btn square" href="https://github.com/liyincode/x-likes-search" target="_blank" rel="noopener noreferrer" title="Open GitHub repository" aria-label="Open GitHub repository">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 .5A12 12 0 0 0 8.2 23.9c.6.1.8-.3.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.2 1.9 1.2 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.2 11.2 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.2c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z"/>
          </svg>
        </a>
        <button class="ico-btn square" id="theme-btn" title="Toggle theme" aria-label="Toggle theme"></button>
        <button class="ico-btn" id="export">export</button>
        <button class="ico-btn accent" id="open-likes">sync</button>
      </div>

      <div class="search-bar">
        <div class="cmd-wrap">
          <div class="cmd">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
              <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <input id="q" type="text" placeholder="Find a liked tweet…" autocomplete="off" spellcheck="false" />
            <span class="matchcount" id="mc"></span>
          </div>
          <div class="history" id="history"></div>
        </div>
      </div>

      <div class="filters">
        <div class="sortgrp" id="sort" aria-label="Sort results">
          <button data-sort="newest" aria-pressed="true">newest</button>
          <button data-sort="oldest" aria-pressed="false">oldest</button>
          <button data-sort="author" aria-pressed="false">author</button>
        </div>
      </div>

      <div class="feed-scroll" id="feed-scroll">
        <div class="results" id="results"></div>
        <div id="empty"></div>
      </div>
    </div>

    <div class="statusbar">
      <div class="sb-inner">
        <span class="sb-status"><span class="sb-dot"></span><span id="sb-status">0 liked · local only</span></span>
        <span class="sb-grow"></span>
        <span class="sb-hints">
          <span><span class="key">↵</span><span class="key">↓</span> next</span>
          <span><span class="key">↑</span> prev</span>
          <span><span class="key">⌘</span><span class="key">↵</span> open</span>
          <span><span class="key">esc</span> clear</span>
        </span>
      </div>
    </div>

    <div class="toast" id="toast"><span class="ic">✓</span><span id="toast-txt">Link copied</span></div>

    <script src="feed-core.js"></script>
    <script src="feed.js"></script>
  </body>
</html>
