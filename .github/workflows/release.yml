name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' manifest.json | head -1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]*)".*/\1/')
          echo "tag version:      $tag"
          echo "manifest version: $manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest). Bump manifest.json before tagging."
            exit 1
          fi

      - name: Package extension
        run: |
          zip -r "x-likes-search-${GITHUB_REF_NAME}.zip" \
            manifest.json \
            background.js \
            content.js \
            inject.js \
            feed.html \
            feed.css \
            feed.js \
            feed-core.js \
            assets/fonts \
            assets/icons \
            -x '*/.DS_Store'

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: x-likes-search-${{ github.ref_name }}.zip
          generate_release_notes: true
